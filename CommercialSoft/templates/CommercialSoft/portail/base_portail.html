{% extends "CommercialSoft/starter-page.html" %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'autre/plugins/fontawesome-free/css/all.min.css' %}">
<link rel="stylesheet" href="{% static 'autre/dist/css/adminlte.min.css' %}">
<style>
  .badge.portail-badge-attente,
  .badge.portail-badge-traitee,
  .badge.portail-badge-rejetee {
    font-weight: 500;
    padding: .45em .9em;
    border-radius: 2rem;
  }
  .portail-badge-attente { background-color: #fff3cd; color: #92660a; }
  .portail-badge-traitee { background-color: #d1f5e0; color: #0f8a47; }
  .portail-badge-rejetee { background-color: #fde0e0; color: #c0392b; }
</style>
{% endblock %}

{% block navmenu %}
<ul>
  <li><a href="{% url 'portail_accueil' %}" {% if request.resolver_match.url_name == 'portail_accueil' %}class="active"{% endif %}><i class="bi bi-house me-1"></i>Accueil</a></li>
  <li><a href="{% url 'portail_produits' %}" {% if request.resolver_match.url_name == 'portail_produits' %}class="active"{% endif %}><i class="bi bi-cart-plus me-1"></i>Nouvelle commande</a></li>
  <li><a href="{% url 'portail_mes_commandes' %}" {% if request.resolver_match.url_name == 'portail_mes_commandes' or request.resolver_match.url_name == 'portail_commande_detail' %}class="active"{% endif %}><i class="bi bi-bag-check me-1"></i>Mes commandes</a></li>
  <li><a href="{% url 'portail_versements' %}" {% if request.resolver_match.url_name == 'portail_versements' %}class="active"{% endif %}><i class="bi bi-cash-coin me-1"></i>Mes versements</a></li>
</ul>
{% endblock %}
