{% extends "CommercialSoft/portail/base_portail.html" %}

{% block corp %}
<h2 class="h4 mb-3">Mes versements</h2>

<div class="card portail-card">
  <div class="table-responsive">
    <table class="table table-hover m-0">
      <thead>
        <tr>
          <th>#</th>
          <th>Date</th>
          <th>Montant</th>
        </tr>
      </thead>
      <tbody>
        {% for versement in versements %}
        <tr>
          <td>{{ versement.id }}</td>
          <td>{{ versement.date }}</td>
          <td>{{ versement.montant|floatformat:0 }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="3" class="text-center text-muted py-3">Aucun versement enregistré.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
