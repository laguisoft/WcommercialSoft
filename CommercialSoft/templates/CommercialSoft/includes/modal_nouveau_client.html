<!-- Modal nouveau client -->
<div class="modal fade" id="modalNouveauClient" tabindex="-1" aria-labelledby="modalNouveauClientLabel" aria-hidden="true">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header bg-success text-white py-2">
        <h5 class="modal-title" id="modalNouveauClientLabel">
          <i class="fas fa-user-plus mr-2"></i>Nouveau client
        </h5>
        <button type="button" class="close text-white" data-dismiss="modal" aria-label="Fermer">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <div id="erreurNouveauClient" class="alert alert-danger d-none"></div>
        <div class="form-group mb-2">
          <label class="mb-0">Nom <span class="text-danger">*</span></label>
          <input type="text" class="form-control form-control-sm" id="ncNom" placeholder="Nom du client">
        </div>
        <div class="form-group mb-0">
          <label class="mb-0">Téléphone</label>
          <input type="text" class="form-control form-control-sm" id="ncTelephone" placeholder="Numéro de téléphone">
        </div>
      </div>
      <div class="modal-footer py-2">
        <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">Annuler</button>
        <button type="button" class="btn btn-success btn-sm" id="btnSauvegarderClient">
          <i class="fas fa-save mr-1"></i>Enregistrer
        </button>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  // id du select client selon le template (clientid pour vente/baseVente, id_client pour vente2)
  function getSelectClient() {
    return document.getElementById("clientid") || document.getElementById("id_client");
  }

  window.ouvrirModalNouveauClient = function () {
    document.getElementById("ncNom").value = "";
    document.getElementById("ncTelephone").value = "";
    document.getElementById("erreurNouveauClient").classList.add("d-none");
    $('#modalNouveauClient').modal('show');
    setTimeout(() => document.getElementById("ncNom").focus(), 400);
  };

  document.getElementById("btnSauvegarderClient").addEventListener("click", async function () {
    const nom = document.getElementById("ncNom").value.trim();
    const telephone = document.getElementById("ncTelephone").value.trim();
    const erreurDiv = document.getElementById("erreurNouveauClient");

    if (!nom) {
      erreurDiv.textContent = "Le nom du client est obligatoire.";
      erreurDiv.classList.remove("d-none");
      return;
    }

    this.disabled = true;
    this.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>Enregistrement...';

    try {
      const resp = await fetch("{% url 'api_creer_client' %}", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": document.querySelector("[name=csrfmiddlewaretoken]").value
        },
        body: JSON.stringify({ nom, telephone })
      });

      const data = await resp.json();

      if (!resp.ok) {
        erreurDiv.textContent = data.erreur || "Erreur lors de la création.";
        erreurDiv.classList.remove("d-none");
      } else {
        const select = getSelectClient();
        const option = new Option(data.nom, data.id, true, true);
        select.appendChild(option);
        $(select).trigger("change");

        // mise à jour cache localforage si disponible
        if (typeof localforage !== "undefined") {
          localforage.getItem("clients").then(function (clients) {
            clients = clients || [];
            clients.push({ id: data.id, nom: data.nom });
            localforage.setItem("clients", clients);
          });
        }

        $('#modalNouveauClient').modal('hide');
        if (typeof toastr !== "undefined") {
          toastr.success("Client « " + data.nom + " » créé et sélectionné !");
        }
      }
    } catch (e) {
      erreurDiv.textContent = "Erreur réseau. Veuillez réessayer.";
      erreurDiv.classList.remove("d-none");
    }

    this.disabled = false;
    this.innerHTML = '<i class="fas fa-save mr-1"></i>Enregistrer';
  });

  ["ncNom", "ncTelephone"].forEach(function (id) {
    document.getElementById(id).addEventListener("keydown", function (e) {
      if (e.key === "Enter") document.getElementById("btnSauvegarderClient").click();
    });
  });
})();
</script>
